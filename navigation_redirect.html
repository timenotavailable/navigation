<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>北园地铁站停车场导航</title>

<script>
function isWeChat() {
  return /micromessenger/i.test(navigator.userAgent);
}

function isAndroid() {
  return /android/i.test(navigator.userAgent);
}

function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent);
}

window.onload = function() {

  var lat = "36.687070485067174";
  var lng = "117.03780949115752";
  var name = "北园地铁站停车场";

  // ===== 地图URL =====
  var amap = "https://uri.amap.com/navigation?to=" + lng + "," + lat + "," + name + "&mode=car";
  var baidu = "https://api.map.baidu.com/direction?destination=latlng:" + lat + "," + lng + "|name:" + name + "&mode=driving";
  var apple = "https://maps.apple.com/?daddr=" + lat + "," + lng;

  // ===== 微信内 =====
  if (isWeChat()) {
    document.getElementById("wechat").style.display = "block";
    return;
  }

  // ===== 安卓 =====
  if (isAndroid()) {
    window.location.href = amap;

    // 兜底：2秒后跳百度
    setTimeout(function(){
      window.location.href = baidu;
    }, 2000);

    return;
  }

  // ===== 苹果 =====
  if (isIOS()) {
    window.location.href = amap;

    // 兜底：2秒后跳Apple地图
    setTimeout(function(){
      window.location.href = apple;
    }, 2000);

    return;
  }

  // ===== 其他设备 =====
  window.location.href = amap;
}
</script>

</head>

<body style="text-align:center;margin-top:100px;font-family:Arial;">

<h2>📍 北园地铁站停车场</h2>

<!-- 微信提示 -->
<div id="wechat" style="display:none;">
  <p>⚠️ 微信限制无法直接打开导航</p>
  <p>请点击下方按钮或右上角用浏览器打开</p>

  <div style="margin-top:30px;">
    <a href="https://uri.amap.com/navigation?to=117.03780949115752,36.687070485067174,北园地铁站停车场&mode=car">
      <button style="font-size:18px;padding:12px 25px;margin:10px;border-radius:8px;background:#07c160;color:white;border:none;">
        高德导航
      </button>
    </a>

    <br>

    <a href="https://api.map.baidu.com/direction?destination=latlng:36.687070485067174,117.03780949115752|name:北园地铁站停车场&mode=driving">
      <button style="font-size:18px;padding:12px 25px;margin:10px;border-radius:8px;background:#3385ff;color:white;border:none;">
        百度导航
      </button>
    </a>
  </div>

  <p style="margin-top:20px;color:gray;">
    👉 或点击右上角 ··· → 在浏览器打开
  </p>
</div>

</body>
</html>

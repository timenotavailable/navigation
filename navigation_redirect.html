<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>导航中转</title>

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    text-align:center;
    background:#f5f5f5;
}
.box{
    padding:40px 20px;
}
.btn{
    display:block;
    margin:15px auto;
    padding:15px;
    width:80%;
    max-width:300px;
    background:#007aff;
    color:#fff;
    border-radius:8px;
    text-decoration:none;
    font-size:16px;
}
.tip{
    position:fixed;
    top:0;
    left:0;
    right:0;
    bottom:0;
    background:rgba(0,0,0,0.8);
    color:#fff;
    display:none;
    align-items:center;
    justify-content:center;
    font-size:18px;
    padding:20px;
}
</style>

</head>

<body>

<div class="box">
    <h2>📍 北园地块停车场</h2>
    <p>请选择导航方式</p>

    <a class="btn" id="amap">打开高德地图</a>
    <a class="btn" id="baidu">打开百度地图</a>
    <a class="btn" id="apple">打开Apple地图</a>
</div>

<div class="tip" id="tip">
    请点击右上角 → 在浏览器打开
</div>

<script>

// ======= 你的坐标（已填）=======
var lat = 36.687070485067174;
var lng = 117.03780949115752;
var name = "北园地块停车场";

// ======= 判断环境 =======
var ua = navigator.userAgent.toLowerCase();
var isWeixin = ua.indexOf('micromessenger') !== -1;
var isAndroid = ua.indexOf('android') !== -1;
var isiOS = /iphone|ipad|ipod/.test(ua);

// ======= 地图URL =======
var amap = `https://uri.amap.com/marker?position=${lng},${lat}&name=${name}`;
var baidu = `https://api.map.baidu.com/marker?location=${lat},${lng}&title=${name}&output=html`;
var apple = `https://maps.apple.com/?daddr=${lat},${lng}&q=${name}`;

// ======= 按钮绑定 =======
document.getElementById("amap").onclick = () => jump(amap);
document.getElementById("baidu").onclick = () => jump(baidu);
document.getElementById("apple").onclick = () => jump(apple);

// ======= 跳转逻辑 =======
function jump(url){
    if(isWeixin){
        document.getElementById("tip").style.display="flex";
    }else{
        window.location.href = url;
    }
}

// ======= 非微信自动跳转（更丝滑）=======
if(!isWeixin){
    if(isAndroid){
        window.location.href = amap;
    }else if(isiOS){
        window.location.href = apple;
    }
}

</script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>导航跳转</title>
<script>
function redirect() {
    var ua = navigator.userAgent;
    var lat = 36.687070;
    var lng = 117.037809;

    var amap = "https://uri.amap.com/navigation?to=" + lng + "," + lat + "&mode=car&policy=1";
    var baidu = "https://api.map.baidu.com/direction?destination=latlng:" + lat + "," + lng + "|name:目的地&mode=driving";

    // 所有设备优先高德（成功率最高）
    window.location.href = amap;

    // 2秒后提供百度备用
    setTimeout(function(){
        document.body.innerHTML = `
        <div style="text-align:center;margin-top:50px;font-size:18px;">
        如果没有自动打开导航，请选择👇<br><br>
        <a href="${amap}">👉 打开高德地图</a><br><br>
        <a href="${baidu}">👉 打开百度地图</a>
        </div>`;
    },2000);
}
</script>
</head>
<body onload="redirect()">
<p>正在为您打开导航...</p>
</body>
</html>
